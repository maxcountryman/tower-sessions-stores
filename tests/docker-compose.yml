
services:
  mongodb_store:
    image: mongodb/mongodb-community-server:latest-slim
    ports:
      - "127.0.0.1:27017:27017"

  redis_store:
    image: redis:alpine
    ports:
      - "127.0.0.1:6379:6379"

  postgres_store:
    image: postgres:alpine
    environment:
      POSTGRES_PASSWORD: "postgres"
    ports:
      - "127.0.0.1:5432:5432"

  mysql_store:
    image: mysql
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=true
      - MYSQL_DATABASE=public
    ports:
      - "127.0.0.1:3306:3306"
